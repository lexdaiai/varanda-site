version: "3.8"

services:
  app:
    image: varanda-site:latest
    networks:
      - d4inet
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"

        # --- HTTPS: varandacl.com.br (sem www) ---
        - "traefik.http.routers.varanda.rule=Host(`varandacl.com.br`)"
        - "traefik.http.routers.varanda.entrypoints=websecure"
        - "traefik.http.routers.varanda.tls=true"
        - "traefik.http.routers.varanda.tls.certresolver=letsencrypt"
        - "traefik.http.services.varanda.loadbalancer.server.port=3000"

        # --- Redirect www → sem www ---
        - "traefik.http.routers.varanda-www.rule=Host(`www.varandacl.com.br`)"
        - "traefik.http.routers.varanda-www.entrypoints=websecure"
        - "traefik.http.routers.varanda-www.tls=true"
        - "traefik.http.routers.varanda-www.tls.certresolver=letsencrypt"
        - "traefik.http.routers.varanda-www.middlewares=varanda-nowww"
        - "traefik.http.middlewares.varanda-nowww.redirectregex.regex=^https://www\\.varandacl\\.com\\.br/(.*)"
        - "traefik.http.middlewares.varanda-nowww.redirectregex.replacement=https://varandacl.com.br/$${1}"
        - "traefik.http.middlewares.varanda-nowww.redirectregex.permanent=true"

        # --- Redirect HTTP → HTTPS ---
        - "traefik.http.routers.varanda-http.rule=Host(`varandacl.com.br`) || Host(`www.varandacl.com.br`)"
        - "traefik.http.routers.varanda-http.entrypoints=web"
        - "traefik.http.routers.varanda-http.middlewares=varanda-https"
        - "traefik.http.middlewares.varanda-https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.varanda-https.redirectscheme.permanent=true"

networks:
  d4inet:
    external: true
